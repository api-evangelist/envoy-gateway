apis:
  - aid: envoy-gateway:envoy-gateway
    name: Envoy Gateway
    description: >-
      Envoy Gateway provides an expressive, extensible, role-oriented
      API for Kubernetes gateway management built on Envoy Proxy.
      Configuration is done through Kubernetes Gateway API resources
      (Gateway, GatewayClass, HTTPRoute, GRPCRoute) and Envoy Gateway
      CRDs (BackendTrafficPolicy, ClientTrafficPolicy, SecurityPolicy).
    humanURL: https://gateway.envoyproxy.io/
