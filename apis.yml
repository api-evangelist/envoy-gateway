aid: envoy-gateway
name: Envoy Gateway
description: >-
  Envoy Gateway is a CNCF project providing a Kubernetes-native API
  gateway built on Envoy Proxy, implementing the Kubernetes Gateway
  API for simplified traffic management and ingress control. Envoy
  Gateway exposes its functionality through Kubernetes Gateway API
  resources and Custom Resource Definitions rather than a traditional
  REST API.
type: Index
